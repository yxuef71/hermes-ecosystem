name: Audit Summaries

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: main-bot-push
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write  # required to dispatch build-pages.yml via `gh workflow run`
      issues: write   # required for the dead-repo tracking issue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run summary audit
        id: audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          node scripts/audit-summaries.js
          # Capture whether anything was flagged so the next step can decide
          # whether to trigger immediate regeneration. The audit clears
          # readmeHash on flagged entries, so a non-empty diff in
          # data/summaries.json means something was flagged.
          if git diff --quiet data/summaries.json; then
            echo "flagged=false" >> $GITHUB_OUTPUT
          else
            echo "flagged=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit if flagged
        run: |
          git add data/summaries.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "Hermes Atlas Bot"
          git config user.email "bot@hermesatlas.com"
          git commit -m "Audit: flag stale/hallucinated summaries for regeneration"

          # main can move during the audit (PR merge, another bot workflow
          # committing) — vanilla `git push` then fails with
          # `! [rejected] main -> main (fetch first)`. Retry up to 3 times,
          # rebasing onto the new remote tip between attempts.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              break
            fi
            echo "Push rejected (attempt $attempt) — pulling --rebase and retrying"
            git pull --rebase origin main || { echo "Rebase failed — aborting"; exit 1; }
            if [ "$attempt" = "3" ]; then
              echo "Push failed after 3 attempts"
              exit 1
            fi
          done

      - name: Trigger build-pages to regenerate flagged summaries
        if: steps.audit.outputs.flagged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Without this dispatch, flagged-as-hallucinated summaries stay
          # live until the next daily build-pages cron — up to ~22 hours
          # of stale content for what the audit just identified as wrong.
          # Triggering build-pages immediately closes that window to the
          # length of one build run (~3 minutes).
          gh workflow run build-pages.yml
          echo "Dispatched build-pages.yml to regenerate flagged summaries"

      - name: Detect dead repos
        if: always()  # run even if earlier steps failed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-dead-repos.js

      - name: Open or update dead-repo tracking issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Dead repos detected in data/repos.json"
          # `in:title` scopes the search to the title field so we don't
          # match stray issues that happen to mention the phrase in their body.
          existing=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "\"$title\" in:title" \
            --json number \
            --jq '.[0].number // empty')

          if [ ! -s dead-repos.md ]; then
            echo "No dead repos detected"
            if [ -n "$existing" ]; then
              gh issue close "$existing" \
                --repo "$GITHUB_REPOSITORY" \
                --comment "Auto-closed: no dead repos detected in latest audit run."
              echo "Closed stale issue #$existing"
            fi
            exit 0
          fi

          if [ -n "$existing" ]; then
            gh issue edit "$existing" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file dead-repos.md
            echo "Updated existing issue #$existing"
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --body-file dead-repos.md
          fi
