name: Build Project & List Pages

concurrency:
  group: main-bot-push
  cancel-in-progress: false

on:
  schedule:
    - cron: '30 6 * * *'  # Daily at 06:30 UTC (30 min after release-monitor)
  push:
    branches: [main]
    paths:
      - 'data/repos.json'
      - 'data/lists.json'
      - 'scripts/build-pages.js'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate summaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/generate-summaries.js

      - name: Build project pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-pages.js

      - name: Check for changes
        id: diff
        run: |
          git add projects/ lists/ sitemap.xml robots.txt llms.txt llms-full.txt rss.xml data/summaries.json data/list-summaries.json
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            PAGES=$(find projects -name '*.html' | wc -l)
            LISTS=$(find lists -name '*.html' | wc -l)
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "pages=$PAGES" >> $GITHUB_OUTPUT
            echo "lists=$LISTS" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated pages
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "Hermes Atlas Bot"
          git config user.email "bot@hermesatlas.com"
          git commit -m "Rebuild project pages (${{ steps.diff.outputs.pages }} projects, ${{ steps.diff.outputs.lists }} lists)"

          # main can move during a multi-minute build (PR merge, another
          # bot workflow committing) — vanilla `git push` then fails with
          # `! [rejected] main -> main (fetch first)`. Retry up to 3 times,
          # rebasing onto the new remote tip between attempts.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — pulling --rebase and retrying"
            git pull --rebase origin main || { echo "Rebase failed — aborting"; exit 1; }
          done
          echo "Push failed after 3 attempts"
          exit 1

      - name: Ping IndexNow with changed URLs
        if: steps.diff.outputs.changed == 'true'
        run: node scripts/indexnow-ping.js
